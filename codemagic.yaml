workflows:
  # ── iOS: TestFlight ──────────────────────────────────────────────────────────
  ios-testflight:
    name: BuddyMarketAI iOS → TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22.13.0
      xcode: latest
      cocoapods: default
      groups:
        - apple_credentials   # APP_STORE_CONNECT_ISSUER_ID, APP_STORE_CONNECT_KEY_IDENTIFIER, APP_STORE_CONNECT_PRIVATE_KEY
        - certificate_credentials  # CERTIFICATE_PRIVATE_KEY
        - apple_iap_credentials    # APPLE_IAP_KEY_ID, APPLE_IAP_ISSUER_ID, APPLE_IAP_PRIVATE_KEY
      vars:
        BUNDLE_ID: io.buddymarket.app
        APPLE_BUNDLE_ID: io.buddymarket.app
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        APP_STORE_APPLE_ID: "6744649860"  # ← Apple ID de la app en App Store Connect

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install Node dependencies
        script: |
          npm install -g pnpm
          pnpm install --frozen-lockfile

      - name: Build web assets
        script: pnpm build

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - BuddyMarket Testers
      email:
        recipients:
          - hola@buddymarketapp.com
        notify:
          success: true
          failure: true

  # ── Android: Google Play Internal Testing ───────────────────────────────────
  android-play:
    name: BuddyMarketAI Android → Play Store
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      node: 22.13.0
      java: 17
      groups:
        - google_play_credentials  # GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        - android_signing           # CM_KEYSTORE, CM_KEYSTORE_PASSWORD, CM_KEY_ALIAS, CM_KEY_PASSWORD
      vars:
        PACKAGE_NAME: io.buddymarket.app

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install Node dependencies
        script: |
          npm install -g pnpm
          pnpm install --frozen-lockfile

      - name: Build web assets
        script: pnpm build

      - name: Sync Capacitor
        script: npx cap sync android

      - name: Set up keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > /tmp/keystore.jks
          cat >> "$CM_BUILD_DIR/android/key.properties" <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=/tmp/keystore.jks
          EOF

      - name: Build Android release
        script: |
          cd android
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
      email:
        recipients:
          - hola@buddymarketapp.com
        notify:
          success: true
          failure: true
