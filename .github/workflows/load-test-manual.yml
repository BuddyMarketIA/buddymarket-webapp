name: Load Tests (Manual)

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Test scenario to run"
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - load
          - stress
      base_url:
        description: "Target URL (leave empty for production)"
        required: false
        default: ""
      notify_slack:
        description: "Send results to Slack"
        required: false
        default: true
        type: boolean

  # Also run automatically every Monday at 09:00 UTC (weekly load test)
  schedule:
    - cron: "0 9 * * 1"

concurrency:
  group: load-test-${{ github.ref }}
  cancel-in-progress: false  # Never cancel load tests mid-run

jobs:
  load-test:
    name: "k6 ${{ github.event.inputs.scenario || 'load' }} test"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      BASE_URL: ${{ github.event.inputs.base_url || secrets.STAGING_URL || 'https://appbuddymarket.com' }}
      SCENARIO: ${{ github.event.inputs.scenario || 'load' }}
      METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq
          sudo apt-get install -y k6
          k6 version

      - name: Create reports directory
        run: mkdir -p load-tests/reports

      - name: Notify Slack — test starting
        if: (github.event.inputs.notify_slack == 'true' || github.event_name == 'schedule') && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \":hourglass_flowing_sand: *BuddyMarket Load Test Starting*\",
              \"attachments\": [{
                \"color\": \"#439FE0\",
                \"fields\": [
                  {\"title\": \"Scenario\", \"value\": \"$SCENARIO\", \"short\": true},
                  {\"title\": \"Target\", \"value\": \"$BASE_URL\", \"short\": true},
                  {\"title\": \"Triggered by\", \"value\": \"${{ github.actor }}\", \"short\": true},
                  {\"title\": \"Event\", \"value\": \"${{ github.event_name }}\", \"short\": true}
                ]
              }]
            }"

      - name: Run k6 load test
        id: k6
        run: |
          SCRIPT="load-tests/main.js"
          [ "$SCENARIO" = "smoke" ] && SCRIPT="load-tests/smoke.js"

          k6 run \
            --env BASE_URL="$BASE_URL" \
            --env SCENARIO="$SCENARIO" \
            --env METRICS_TOKEN="$METRICS_TOKEN" \
            --out json=load-tests/reports/${SCENARIO}-raw.json \
            "$SCRIPT"
        continue-on-error: true

      - name: Parse k6 results
        if: always()
        id: parse
        run: |
          RESULT_FILE="load-tests/reports/${SCENARIO}-raw.json"
          if [ -f "$RESULT_FILE" ]; then
            # Extract key metrics from JSON output
            P95=$(cat "$RESULT_FILE" | python3 -c "
          import json, sys
          data = [json.loads(l) for l in sys.stdin if l.strip()]
          durations = [d['data']['value'] for d in data if d.get('type') == 'Point' and d.get('metric') == 'http_req_duration']
          if durations:
            durations.sort()
            idx = int(len(durations) * 0.95)
            print(f'{durations[idx]:.0f}')
          else:
            print('N/A')
          " 2>/dev/null || echo "N/A")
            echo "p95_latency=${P95}ms" >> $GITHUB_OUTPUT
          fi
          echo "outcome=${{ steps.k6.outcome }}" >> $GITHUB_OUTPUT

      - name: Upload k6 reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "k6-${{ env.SCENARIO }}-report-${{ github.run_number }}"
          path: load-tests/reports/
          retention-days: 30

      - name: Notify Slack — test results
        if: always() && (github.event.inputs.notify_slack == 'true' || github.event_name == 'schedule') && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          STATUS="${{ steps.k6.outcome }}"
          COLOR=$([ "$STATUS" = "success" ] && echo "#36a64f" || echo "#ff0000")
          EMOJI=$([ "$STATUS" = "success" ] && echo ":white_check_mark:" || echo ":x:")
          P95="${{ steps.parse.outputs.p95_latency }}"

          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"$EMOJI *BuddyMarket Load Test Completed*\",
              \"attachments\": [{
                \"color\": \"$COLOR\",
                \"fields\": [
                  {\"title\": \"Scenario\", \"value\": \"$SCENARIO\", \"short\": true},
                  {\"title\": \"Status\", \"value\": \"$STATUS\", \"short\": true},
                  {\"title\": \"p95 Latency\", \"value\": \"${P95:-N/A}\", \"short\": true},
                  {\"title\": \"Target\", \"value\": \"$BASE_URL\", \"short\": true},
                  {\"title\": \"Run\", \"value\": \"#${{ github.run_number }}\", \"short\": true},
                  {\"title\": \"Report\", \"value\": \"<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View artifacts>\", \"short\": true}
                ]
              }]
            }"

      - name: Fail job if k6 thresholds exceeded
        if: steps.k6.outcome == 'failure'
        run: |
          echo "❌ k6 load test failed — thresholds exceeded or errors detected"
          echo "📊 Check the artifact 'k6-${{ env.SCENARIO }}-report-${{ github.run_number }}' for details"
          exit 1
